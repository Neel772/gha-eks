name: Kubernetes CI
on:
  push:
    branches:
      - main

jobs:
  pyapp-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v7.0.0
      - name: Build Docker Image
        run: "docker build -t nk772/gha-pyapp:${GITHUB_SHA::7} ."
      - name: Login to Docker Hub
        uses: docker/login-action@v4.4.0
        with:
          username: "${{ secrets.DOCKER_USERNAME }}"
          password: "${{ secrets.DOCKER_PASSWORD }}"
      - name: Push Docker Image to Docker Hub
        run: "docker push nk772/gha-pyapp:${GITHUB_SHA::7}"
      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
      - name: Update deployment.yml with latest docker tag
        run: |
          # Short commit hash
          SHORT_SHA=${GITHUB_SHA::7}
          # Update the image tag in deployment.yml
          yq -i '.spec.template.spec.containers[0].image = "nk772/gha-pyapp:$SHORT_SHA"' ./k8s/pyapp-deployment.yml
      - name: Commit deployment file changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@noreply"
          git add k8s/pyapp-deployment.yml
          git commit -m 'docker tag updated by Github Actions'
          
        
        
          
